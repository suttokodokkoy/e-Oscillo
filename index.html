<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Web e-Oscillo v0.1 Prototype</title>
  <style>
    :root {
      --bg: #101319;
      --panel: #181d26;
      --panel-2: #202735;
      --text: #eef3ff;
      --muted: #8e9ab2;
      --accent: #70d6ff;
      --accent-2: #ffd166;
      --danger: #ff6b6b;
      --line: rgba(255,255,255,0.12);
      --disabled: rgba(255,255,255,0.35);
    }

    * {
      box-sizing: border-box;
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    html, body {
      overscroll-behavior: none;
      touch-action: none;
    }

    body {
      margin: 0;
      height: 100svh;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1a2230 0%, var(--bg) 55%);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: stretch;
      padding: 10px;
    }

    .app {
      width: min(1100px, 100%);
      height: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      gap: 8px;
      min-height: 0;
    }

    header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-end;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.05rem, 2vw, 1.8rem);
      letter-spacing: 0.02em;
    }

    .subtitle {
      color: var(--muted);
      margin-top: 2px;
      font-size: 0.8rem;
    }

    .status {
      text-align: right;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
      font-size: 0.9rem;
    }

    .scope-card {
      background: linear-gradient(180deg, rgba(255,255,255,0.055), rgba(255,255,255,0.025));
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 8px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.3);
      min-height: 0;
      height: 100%;
    }

    canvas {
      touch-action: none;
      width: 100%;
      height: 100%;
      display: block;
      background: #05070a;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .controls {
      display: grid;
      grid-template-columns: 1.15fr 1.35fr 1fr;
      gap: 8px;
      min-height: 0;
    }

    .panel {
      background: rgba(24, 29, 38, 0.9);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 10px;
      box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      min-width: 0;
    }

    .transport, .osc, .zoom { grid-column: auto; }

    .panel.disabled {
      opacity: 0.42;
      filter: grayscale(0.5);
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 6px;
      gap: 8px;
    }

    .panel-title strong { font-size: 1.05rem; }
    .readout {
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-weight: 700;
    }

    .readout.b { color: var(--accent-2); }

    button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 12px;
      padding: 9px 10px;
      color: var(--text);
      background: var(--panel-2);
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.08s ease, background 0.15s ease, border 0.15s ease;
      min-height: 38px;
      white-space: nowrap;
    }

    button:hover { transform: translateY(-1px); }
    button:active { transform: translateY(0px) scale(0.99); }
    button.primary { background: linear-gradient(180deg, #176f9e, #145878); }
    button.active { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(112,214,255,0.18) inset; }
    button.warning.active { border-color: var(--accent-2); box-shadow: 0 0 0 2px rgba(255,209,102,0.18) inset; }

    .button-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      margin-bottom: 8px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 0.78rem;
      margin-bottom: 5px;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--accent);
      cursor: pointer;
    }

    .osc:nth-child(3) input[type="range"] { accent-color: var(--accent-2); }

    input:disabled { cursor: not-allowed; }

    .hidden-frequency-range {
      display: none;
    }

    .drag-band {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
      position: relative;
      height: 58px;
      border-radius: 16px;
      background: linear-gradient(180deg, rgba(112,214,255,0.18), rgba(112,214,255,0.06));
      border: 1px solid rgba(112,214,255,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      touch-action: none;
      cursor: ew-resize;
      overflow: hidden;
      font-weight: 800;
      letter-spacing: 0.03em;
      margin-bottom: 10px;
    }

    #bandB {
      background: linear-gradient(180deg, rgba(255,209,102,0.18), rgba(255,209,102,0.06));
      border-color: rgba(255,209,102,0.35);
    }

    .drag-band::before,
    .drag-band::after {
      content: "";
      position: absolute;
      top: 0;
      bottom: 0;
      width: 34%;
      pointer-events: none;
      opacity: 0.35;
    }

    .drag-band::before {
      left: 0;
      background: linear-gradient(90deg, rgba(255,255,255,0.14), transparent);
    }

    .drag-band::after {
      right: 0;
      background: linear-gradient(270deg, rgba(255,255,255,0.14), transparent);
    }

    .drag-band .arrows {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      color: rgba(255,255,255,0.52);
      font-size: 1.45rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.12s ease;
    }

    .drag-band .band-label {
      position: relative;
      z-index: 2;
      color: rgba(238,243,255,0.95);
    }

    .drag-band.active {
      cursor: none;
      box-shadow: 0 0 0 2px rgba(112,214,255,0.20) inset, 0 0 28px rgba(112,214,255,0.12);
    }

    #bandB.active {
      box-shadow: 0 0 0 2px rgba(255,209,102,0.22) inset, 0 0 28px rgba(255,209,102,0.12);
    }

    .drag-band.active .arrows { opacity: 1; }

    .drag-band.disabled {
      cursor: not-allowed;
      opacity: 0.45;
      filter: grayscale(0.5);
    }

    body.dragging-frequency,
    body.dragging-frequency * {
      cursor: none !important;
    }

    .hint {
      display: none;
    }

    .mono-note {
      display: none;
    }

    .osc-stack {
      display: grid;
      gap: 8px;
    }

    .mini-row {
      min-width: 0;
    }

    .drag-band {
      min-height: 44px;
      padding: 8px 10px;
    }

    @media (max-width: 820px) {
      body { padding: 5px; }
      header {
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: end;
        gap: 4px;
        min-height: 0;
      }
      h1 { font-size: 0.95rem; }
      .subtitle { display: none; }
      .status { text-align: right; margin-top: 0; font-size: 0.6rem; line-height: 1.15; }
      .app {
        gap: 4px;
        grid-template-rows: auto minmax(28svh, 34svh) minmax(0, 1fr);
        overflow: hidden;
      }
      .scope-card { padding: 5px; border-radius: 12px; min-height: 0; }
      canvas { border-radius: 10px; }
      .controls {
        grid-template-columns: 1fr;
        gap: 4px;
        overflow: hidden;
      }
      .panel { padding: 5px 6px; border-radius: 10px; }
      .panel-title { margin-bottom: 2px; gap: 4px; }
      .panel-title strong { font-size: 0.76rem; }
      .readout { font-size: 0.7rem; }
      button { min-height: 28px; padding: 4px 5px; font-size: 0.66rem; border-radius: 9px; }
      .button-row { grid-template-columns: repeat(3, 1fr); gap: 4px; margin-bottom: 3px; }
      label { font-size: 0.58rem; margin-bottom: 2px; }
      input[type="range"] { height: 16px; }
      .osc-stack { gap: 3px; }
      .drag-band {
        height: 30px;
        min-height: 30px;
        padding: 3px 7px;
        margin-bottom: 2px;
        border-radius: 9px;
      }
      .band-label { font-size: 0.62rem; }
      .arrows { font-size: 0.58rem; padding: 0 8px; }
      #panelZoom .drag-band {
        height: 38px;
        min-height: 38px;
      }
    }

    @media (max-width: 430px) and (max-height: 760px) {
      .app {
        grid-template-rows: auto minmax(24svh, 30svh) minmax(0, 1fr);
      }
      .status { display: none; }
      .panel-title strong { font-size: 0.7rem; }
      .readout { font-size: 0.64rem; }
      .drag-band {
        height: 27px;
        min-height: 27px;
      }
      #panelZoom .drag-band {
        height: 34px;
        min-height: 34px;
      }
    }

    @media (min-width: 821px) {
      .scope-card { min-height: 0; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Web e-Oscillo v0.1</h1>
        <div class="subtitle">2音の周波数差とうなりを、30秒で触って見るためのプロトタイプ</div>
      </div>
      <div class="status" id="status">Audio: stopped / Trigger: off / Mode: A+B</div>
    </header>

    <section class="scope-card">
      <canvas id="scope" width="1000" height="360" aria-label="Oscilloscope waveform display"></canvas>
    </section>

    <section class="controls">
      <div class="panel transport">
        <div class="panel-title"><strong>Control</strong><span class="readout" id="modeReadout">A+B</span></div>
        <div class="button-row">
          <button id="playBtn" class="primary">Start</button>
          <button id="modeBtn" class="active">Mode: A+B</button>
          <button id="triggerBtn">Trigger: OFF</button>
        </div>
        <label for="volume">Volume <span id="volumeReadout">20%</span></label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="0.2" />
        
      </div>

      <div class="panel osc" id="panelOsc">
        <div class="panel-title"><strong>Oscillator</strong><span class="readout" id="oscSummary">A 440 / B 441 Hz</span></div>
        <div class="osc-stack">
          <div class="mini-row" id="panelA">
            <div class="panel-title"><strong>Frequency A</strong><span class="readout" id="freqAReadout">440 Hz</span></div>
            <label>帯を押したまま左右へ動かす</label>
            <div class="drag-band" id="bandA" role="slider" aria-label="Frequency A drag band" aria-valuemin="20" aria-valuemax="10000" aria-valuenow="440" tabindex="0">
              <div class="arrows"><span>← lower</span><span>higher →</span></div>
              <span class="band-label">TOUCH / DRAG A</span>
            </div>
            <input class="hidden-frequency-range" id="freqA" type="range" min="20" max="10000" step="1" value="440" aria-hidden="true" tabindex="-1" />
          </div>

          <div class="mini-row" id="panelB">
            <div class="panel-title"><strong>Frequency B</strong><span class="readout b" id="freqBReadout">441 Hz</span></div>
            <label>帯を押したまま左右へ動かす</label>
            <div class="drag-band" id="bandB" role="slider" aria-label="Frequency B drag band" aria-valuemin="20" aria-valuemax="10000" aria-valuenow="441" tabindex="0">
              <div class="arrows"><span>← lower</span><span>higher →</span></div>
              <span class="band-label">TOUCH / DRAG B</span>
            </div>
            <input class="hidden-frequency-range" id="freqB" type="range" min="20" max="10000" step="1" value="441" aria-hidden="true" tabindex="-1" />
          </div>
        </div>
      </div>

      <div class="panel zoom" id="panelZoom">
        <div class="panel-title"><strong>Zoom</strong><span class="readout" id="zoomReadout">8820 samples</span></div>
        <label>表示サンプル数：帯を左右にドラッグ</label>
        <div class="drag-band" id="bandZoom">
          <div class="arrows"><span>← zoom in</span><span>zoom out →</span></div>
          <span class="band-label">TOUCH / DRAG ZOOM</span>
        </div>
      </div>
    </section>
  </main>

  <script>
    document.addEventListener('gesturestart', (e) => e.preventDefault());
    document.addEventListener('gesturechange', (e) => e.preventDefault());
    document.addEventListener('gestureend', (e) => e.preventDefault());

    document.addEventListener('touchmove', (e) => {
      if (e.scale !== undefined && e.scale !== 1) {
        e.preventDefault();
      }
    }, { passive: false });
    const canvas = document.getElementById('scope');
    const ctx = canvas.getContext('2d');

    const playBtn = document.getElementById('playBtn');
    const modeBtn = document.getElementById('modeBtn');
    const triggerBtn = document.getElementById('triggerBtn');
    const freqAInput = document.getElementById('freqA');
    const freqBInput = document.getElementById('freqB');
    const bandA = document.getElementById('bandA');
    const bandB = document.getElementById('bandB');
    const bandZoom = document.getElementById('bandZoom');
    const zoomReadout = document.getElementById('zoomReadout');
    const volumeInput = document.getElementById('volume');
    const freqAReadout = document.getElementById('freqAReadout');
    const freqBReadout = document.getElementById('freqBReadout');
    const oscSummary = document.getElementById('oscSummary');
    const volumeReadout = document.getElementById('volumeReadout');
    const statusEl = document.getElementById('status');
    const modeReadout = document.getElementById('modeReadout');
    const panelB = document.getElementById('panelB');

    const state = {
      audioCtx: null,
      workletNode: null,
      masterGain: null,
      playing: false,
      mode: 'AB', // 'A' or 'AB'
      trigger: false,
      freqA: 440,
      freqB: 441,
      volume: 0.2,
      sampleRateForDrawing: 44100,
      pixelsPerSample: 1,
      phaseOffset: 0,
      visualTimeSeconds: 0,
      lastTime: performance.now(),
      audioStartTime: 0,
      triggerSearchPeriods: 2,
      lastTriggerSample: null,
      triggerHoldSamples: 160,
      activeDrag: null,
      dragSensitivityHzPerPx: 1,
      samplesAcross: 8820,
      samplesMin: 20,
      samplesMax: 44100,
      dragSensitivitySamplesPerPx: 1
    };

    async function createAudioGraph() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      state.audioCtx = new AudioContext();
      state.audioStartTime = state.audioCtx.currentTime;

      const processorCode = `
        class EOscilloSynthProcessor extends AudioWorkletProcessor {
          constructor() {
            super();
            this.freqA = 440;
            this.freqB = 441;
            this.targetFreqA = 440;
            this.targetFreqB = 441;
            this.mode = 'AB';
            this.phaseA = 0;
            this.phaseB = 0;
            this.smoothingSamples = 200;
            this.port.onmessage = (event) => {
              const data = event.data || {};
              if (typeof data.freqA === 'number') this.targetFreqA = data.freqA;
              if (typeof data.freqB === 'number') this.targetFreqB = data.freqB;
              if (typeof data.mode === 'string') this.mode = data.mode;
            };
          }

          process(inputs, outputs) {
            const output = outputs[0];
            const left = output[0];
            const right = output[1] || output[0];
            const twoPi = Math.PI * 2;
            for (let i = 0; i < left.length; i++) {
              // Smooth frequency changes over about 200 samples to avoid clicks.
              this.freqA += (this.targetFreqA - this.freqA) / this.smoothingSamples;
              this.freqB += (this.targetFreqB - this.freqB) / this.smoothingSamples;
              const incA = twoPi * this.freqA / sampleRate;
              const incB = twoPi * this.freqB / sampleRate;
              const a = Math.sin(this.phaseA);
              let sample = a * 0.8;

              if (this.mode === 'AB') {
                const b = Math.sin(this.phaseB);
                // 2つのサイン波を内部で合成し、モノラルとして出す。
                // 同周波数・同位相の場合は振幅が増える。
                sample = (a + b) * 0.4;
              }

              left[i] = sample;
              right[i] = sample;

              this.phaseA += incA;
              this.phaseB += incB;
              if (this.phaseA >= twoPi) this.phaseA -= twoPi;
              if (this.phaseB >= twoPi) this.phaseB -= twoPi;
            }
            return true;
          }
        }
        registerProcessor('e-oscillo-synth', EOscilloSynthProcessor);
      `;

      const blob = new Blob([processorCode], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      await state.audioCtx.audioWorklet.addModule(url);
      URL.revokeObjectURL(url);

      state.masterGain = state.audioCtx.createGain();
      state.masterGain.gain.value = state.volume;
      state.masterGain.connect(state.audioCtx.destination);

      state.workletNode = new AudioWorkletNode(state.audioCtx, 'e-oscillo-synth', {
        numberOfOutputs: 1,
        outputChannelCount: [2]
      });
      state.workletNode.connect(state.masterGain);
      updateAudioParams();
    }

    async function startAudio() {
      if (!state.audioCtx) await createAudioGraph();
      if (state.audioCtx.state === 'suspended') await state.audioCtx.resume();
      state.playing = true;
      playBtn.textContent = 'Stop';
      playBtn.classList.add('active');
      updateAudioParams();
      updateStatus();
    }

    function stopAudio() {
      if (state.audioCtx && state.audioCtx.state === 'running') {
        state.audioCtx.suspend();
      }
      state.playing = false;
      playBtn.textContent = 'Start';
      playBtn.classList.remove('active');
      updateStatus();
    }

    function updateAudioParams() {
      if (!state.audioCtx) return;
      const t = state.audioCtx.currentTime;

      state.masterGain.gain.setTargetAtTime(state.volume, t, 0.01);

      if (state.workletNode) {
        state.workletNode.port.postMessage({
          freqA: state.freqA,
          freqB: state.freqB,
          mode: state.mode
        });
      }
    }

    function updateUI() {
      freqAReadout.textContent = `${Math.round(state.freqA)} Hz`;
      freqBReadout.textContent = `${Math.round(state.freqB)} Hz`;
      volumeReadout.textContent = `${Math.round(state.volume * 100)}%`;
      zoomReadout.textContent = `${Math.round(state.samplesAcross)} samples (${(state.samplesAcross / state.sampleRateForDrawing * 1000).toFixed(1)} ms)`;
      oscSummary.textContent = `A ${Math.round(state.freqA)} / B ${Math.round(state.freqB)} Hz`;

      const isAOnly = state.mode === 'A';
      freqBInput.disabled = isAOnly;
      panelB.classList.toggle('disabled', isAOnly);
      bandB.classList.toggle('disabled', isAOnly);
      bandB.setAttribute('aria-disabled', isAOnly ? 'true' : 'false');
      bandA.setAttribute('aria-valuenow', Math.round(state.freqA));
      bandB.setAttribute('aria-valuenow', Math.round(state.freqB));
      modeBtn.textContent = isAOnly ? 'Mode: A only' : 'Mode: A+B';
      modeBtn.classList.toggle('active', !isAOnly);
      modeReadout.textContent = isAOnly ? 'A only' : 'A+B';
      triggerBtn.textContent = state.trigger ? 'Trigger: ON' : 'Trigger: OFF';
      triggerBtn.classList.toggle('active', state.trigger);
      triggerBtn.classList.toggle('warning', state.trigger);
      updateStatus();
    }

    function updateStatus() {
      statusEl.textContent = `Audio: ${state.playing ? 'running' : 'stopped'} / Trigger: ${state.trigger ? 'on' : 'off'} / Mode: ${state.mode === 'A' ? 'A only' : 'A+B'}`;
    }

    function generatedSample(index, sampleRate, phaseOffsetSamples = 0) {
      const n = index + phaseOffsetSamples;
      const a = Math.sin(2 * Math.PI * state.freqA * n / sampleRate);
      if (state.mode === 'A') return a;
      const b = Math.sin(2 * Math.PI * state.freqB * n / sampleRate);
      return (a + b) * 0.5;
    }

    function getCurrentModelSample(sampleRate, now) {
      // Prefer AudioContext.currentTime so the drawn internal waveform follows
      // the same time base as the sound being sent to the speakers.
      if (state.audioCtx) {
        return (state.audioCtx.currentTime - state.audioStartTime) * sampleRate;
      }

      const dt = (now - state.lastTime) / 1000;
      state.visualTimeSeconds += dt;
      return state.visualTimeSeconds * sampleRate;
    }

    function findTriggerSampleNear(sampleRate, centerSample) {
      // Lightweight peak + hysteresis trigger.
      // 1) Find a strong local peak near the current center.
      // 2) Find the first negative-to-positive zero-cross after that peak.
      // 3) Keep the previous trigger if the new candidate is too close/unstable.

      const searchRadius = 2300;
      const start = Math.floor(centerSample - searchRadius / 2);
      const end = start + searchRadius;

      let peakSample = start;
      let minVal = 1;

      // 最小値（最も負のピーク）を探索
      for (let s = start; s < end; s++) {
        const v = generatedSample(s, sampleRate, 0);
        if (v < minVal) {
          minVal = v;
          peakSample = s;
        }
      }

      let candidate = peakSample;
      let prev = generatedSample(peakSample, sampleRate, 0);
      const zeroSearchEnd = peakSample + searchRadius;

      for (let s = peakSample + 1; s < zeroSearchEnd; s++) {
        const cur = generatedSample(s, sampleRate, 0);
        if (prev < 0 && cur >= 0) {
          candidate = s;
          break;
        }
        prev = cur;
      }

      // Hysteresis: if the new trigger is close to the previous one, keep previous.
      // If it drifted far, accept the new candidate.
      if (state.lastTriggerSample !== null) {
        const drift = candidate - state.lastTriggerSample;
        if (Math.abs(drift) < state.triggerHoldSamples) {
          return state.lastTriggerSample;
        }
      }

      state.lastTriggerSample = candidate;
      return candidate;
    }

    function drawGrid(w, h) {
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#05070a';
      ctx.fillRect(0, 0, w, h);

      ctx.strokeStyle = 'rgba(255,255,255,0.08)';
      ctx.lineWidth = 1;
      const cols = 10;
      const rows = 8;
      for (let i = 0; i <= cols; i++) {
        const x = i * w / cols;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        ctx.stroke();
      }
      for (let j = 0; j <= rows; j++) {
        const y = j * h / rows;
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }

      ctx.strokeStyle = 'rgba(112,214,255,0.35)';
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();
    }

    function drawWaveform(now) {
      const dpr = window.devicePixelRatio || 1;
      const displayW = canvas.clientWidth;
      const displayH = canvas.clientHeight;
      const targetW = Math.floor(displayW * dpr);
      const targetH = Math.floor(displayH * dpr);
      if (canvas.width !== targetW || canvas.height !== targetH) {
        canvas.width = targetW;
        canvas.height = targetH;
      }

      const w = canvas.width;
      const h = canvas.height;
      drawGrid(w, h);

      // time window definition (500 ms window)
      const sampleRate = state.sampleRateForDrawing;
      const samplesAcross = state.samplesAcross;
      const visibleSeconds = samplesAcross / sampleRate;

      // Stop時はゼロ波形
      if (!state.playing) {
        ctx.lineWidth = Math.max(2, 2 * (window.devicePixelRatio || 1));
        ctx.strokeStyle = state.trigger ? '#ffd166' : '#70d6ff';
        ctx.beginPath();
        ctx.moveTo(0, h / 2);
        ctx.lineTo(w, h / 2);
        ctx.stroke();

        ctx.fillStyle = 'rgba(238,243,255,0.75)';
        ctx.font = `${Math.floor(12 * (window.devicePixelRatio || 1))}px system-ui`;
        const ms = (visibleSeconds * 1000).toFixed(2);
        ctx.fillText(`window: ${ms} ms  |  samples: ${samplesAcross}`, 12 * (window.devicePixelRatio || 1), h - 12 * (window.devicePixelRatio || 1));

        requestAnimationFrame(drawWaveform);
        return;
      }

      // Show 500 ms across the width (low-frequency/beat observation).
      const samplesPerPixel = samplesAcross / w;

      const centerSampleOffset = Math.floor(samplesAcross / 2);
      const currentCenterSample = getCurrentModelSample(sampleRate, now);
      state.lastTime = now;

      let startOffset = currentCenterSample - centerSampleOffset;
      let triggerSample = null;

      if (state.trigger) {
        triggerSample = findTriggerSampleNear(sampleRate, currentCenterSample);
        startOffset = triggerSample - centerSampleOffset;
      }

      ctx.lineWidth = Math.max(2, 2 * (window.devicePixelRatio || 1));
      ctx.strokeStyle = state.trigger ? '#ffd166' : '#70d6ff';
      ctx.beginPath();

      const amplitude = h * 0.38;
      for (let x = 0; x < w; x++) {
        const startSample = Math.floor(x * samplesPerPixel);
        const endSample = Math.floor((x + 1) * samplesPerPixel);

        let min = 1;
        let max = -1;

        // サンプル数が多い場合はmin/maxで「帯」として描画
        if (samplesPerPixel > 1) {
          for (let s = startSample; s <= endSample; s++) {
            const v = generatedSample(s, sampleRate, startOffset);
            if (v < min) min = v;
            if (v > max) max = v;
          }
          const yMin = h / 2 - max * amplitude;
          const yMax = h / 2 - min * amplitude;
          ctx.moveTo(x, yMin);
          ctx.lineTo(x, yMax);
        } else {
          const yValue = generatedSample(startSample, sampleRate, startOffset);
          const y = h / 2 - yValue * amplitude;
          if (x === 0) ctx.moveTo(x, y);
          else ctx.lineTo(x, y);
        }
      }
      ctx.stroke();

      if (state.trigger && triggerSample !== null) {
        const centerX = w / 2;
        ctx.strokeStyle = 'rgba(255,209,102,0.55)';
        ctx.lineWidth = Math.max(1, 1.2 * (window.devicePixelRatio || 1));
        ctx.beginPath();
        ctx.moveTo(centerX, 0);
        ctx.lineTo(centerX, h);
        ctx.stroke();
      }

      ctx.fillStyle = 'rgba(238,243,255,0.82)';
      ctx.font = `${Math.floor(14 * (window.devicePixelRatio || 1))}px system-ui`;
      const label = state.mode === 'A'
        ? `A: ${Math.round(state.freqA)} Hz`
        : `A: ${Math.round(state.freqA)} Hz + B: ${Math.round(state.freqB)} Hz  / Δ ${Math.abs(Math.round(state.freqB - state.freqA))} Hz`;
      ctx.fillText(label, 18 * (window.devicePixelRatio || 1), 28 * (window.devicePixelRatio || 1));

      // bottom-left metrics
      ctx.fillStyle = 'rgba(238,243,255,0.75)';
      ctx.font = `${Math.floor(12 * (window.devicePixelRatio || 1))}px system-ui`;
      const ms = (visibleSeconds * 1000).toFixed(2);
      ctx.fillText(`window: ${ms} ms  |  samples: ${samplesAcross}`, 12 * (window.devicePixelRatio || 1), h - 12 * (window.devicePixelRatio || 1));

      requestAnimationFrame(drawWaveform);
    }

    playBtn.addEventListener('click', () => {
      if (state.playing) stopAudio();
      else startAudio();
    });

    modeBtn.addEventListener('click', () => {
      state.mode = state.mode === 'A' ? 'AB' : 'A';
      updateAudioParams();
      updateUI();
    });

    triggerBtn.addEventListener('click', () => {
      state.trigger = !state.trigger;
      updateUI();
    });

    

    freqAInput.addEventListener('input', (event) => {
      state.freqA = Number(event.target.value);
      updateAudioParams();
      updateUI();
    });

    freqBInput.addEventListener('input', (event) => {
      state.freqB = Number(event.target.value);
      updateAudioParams();
      updateUI();
    });

    volumeInput.addEventListener('input', (event) => {
      state.volume = Number(event.target.value);
      updateAudioParams();
      updateUI();
    });

    function clampFrequency(value) {
      return Math.max(20, Math.min(10000, Math.round(value)));
    }

    function setFrequency(target, value) {
      if (target === 'A') {
        state.freqA = clampFrequency(value);
        freqAInput.value = state.freqA;
      } else {
        state.freqB = clampFrequency(value);
        freqBInput.value = state.freqB;
      }
      updateAudioParams();
      updateUI();
    }

    function clampSamples(value) {
      return Math.max(state.samplesMin, Math.min(state.samplesMax, Math.round(value)));
    }

    function setSamples(value) {
      state.samplesAcross = clampSamples(value);
      updateUI();
    }

    function setupDragBand(element, target) {
      element.addEventListener('pointerdown', (event) => {
        if (target === 'B' && state.mode === 'A') return;
        event.preventDefault();
        element.setPointerCapture(event.pointerId);
        element.classList.add('active');
        document.body.classList.add('dragging-frequency');
        state.activeDrag = {
          target,
          pointerId: event.pointerId,
          lastX: event.clientX,
          lastT: event.timeStamp
        };
      });

      element.addEventListener('pointermove', (event) => {
        if (!state.activeDrag || state.activeDrag.pointerId !== event.pointerId || state.activeDrag.target !== target) return;
        const dx = event.clientX - state.activeDrag.lastX;
        const dt = Math.max(1, event.timeStamp - state.activeDrag.lastT);
        state.activeDrag.lastX = event.clientX;
        state.activeDrag.lastT = event.timeStamp;
        if (dx === 0) return;

        const base = target === 'A' ? state.freqA : state.freqB;
        let deltaHz = dx * state.dragSensitivityHzPerPx;
        const velocity = dx / dt;
        const accelFactor = 1 + Math.min(8, Math.abs(velocity) * 0.6);
        deltaHz *= accelFactor;
        const sign = Math.sign(deltaHz);
        const abs = Math.abs(deltaHz);
        if (abs > 2) {
          const boosted = 2 + Math.pow(abs - 2, 1.2);
          deltaHz = sign * boosted;
        }
        setFrequency(target, base + deltaHz);
      });

      function endDrag(event) {
        if (!state.activeDrag || state.activeDrag.pointerId !== event.pointerId || state.activeDrag.target !== target) return;
        element.classList.remove('active');
        document.body.classList.remove('dragging-frequency');
        state.activeDrag = null;
      }

      element.addEventListener('pointerup', endDrag);
      element.addEventListener('pointercancel', endDrag);
      element.addEventListener('lostpointercapture', () => {
        element.classList.remove('active');
        document.body.classList.remove('dragging-frequency');
        if (state.activeDrag && state.activeDrag.target === target) state.activeDrag = null;
      });

      element.addEventListener('keydown', (event) => {
        if (target === 'B' && state.mode === 'A') return;
        const base = target === 'A' ? state.freqA : state.freqB;
        if (event.key === 'ArrowLeft') {
          event.preventDefault();
          setFrequency(target, base - (event.shiftKey ? 10 : 1));
        }
        if (event.key === 'ArrowRight') {
          event.preventDefault();
          setFrequency(target, base + (event.shiftKey ? 10 : 1));
        }
      });
    }

    function setupZoomBand(element) {
      element.addEventListener('pointerdown', (event) => {
        event.preventDefault();
        element.setPointerCapture(event.pointerId);
        element.classList.add('active');
        document.body.classList.add('dragging-frequency');
        state.activeDrag = {
          target: 'ZOOM',
          pointerId: event.pointerId,
          lastX: event.clientX,
          lastT: event.timeStamp
        };
      });

      element.addEventListener('pointermove', (event) => {
        if (!state.activeDrag || state.activeDrag.pointerId !== event.pointerId || state.activeDrag.target !== 'ZOOM') return;
        const dx = event.clientX - state.activeDrag.lastX;
        const dt = Math.max(1, event.timeStamp - state.activeDrag.lastT);
        state.activeDrag.lastX = event.clientX;
        state.activeDrag.lastT = event.timeStamp;
        if (dx === 0) return;

        let delta = dx * state.dragSensitivitySamplesPerPx;
        const velocity = dx / dt;

        // Zoom専用：速度に応じた加速
        const accelFactor = 1 + Math.min(20, Math.abs(velocity) * 2.2);
        delta *= accelFactor;

        const sign = Math.sign(delta);
        const abs = Math.abs(delta);

        // 非線形ブースト
        if (abs > 5) {
          const boosted = 5 + Math.pow(abs - 5, 1.35);
          delta = sign * boosted;
        }

        // 現在のsamples量に応じた動的スケーリング
        // 大きなwindow時でも、見た目の変化率を維持する
        if (Math.abs(delta) >= 2) {
          const dynamicScale = 1 + (state.samplesAcross * 0.0002);
          delta *= dynamicScale;
        }

        setSamples(state.samplesAcross + delta);
      });

      function endDrag(event) {
        if (!state.activeDrag || state.activeDrag.pointerId !== event.pointerId || state.activeDrag.target !== 'ZOOM') return;
        element.classList.remove('active');
        document.body.classList.remove('dragging-frequency');
        state.activeDrag = null;
      }

      element.addEventListener('pointerup', endDrag);
      element.addEventListener('pointercancel', endDrag);
      element.addEventListener('lostpointercapture', () => {
        element.classList.remove('active');
        document.body.classList.remove('dragging-frequency');
        if (state.activeDrag && state.activeDrag.target === 'ZOOM') state.activeDrag = null;
      });
    }

    setupDragBand(bandA, 'A');
    setupDragBand(bandB, 'B');
    setupZoomBand(bandZoom);

    updateUI();
    requestAnimationFrame(drawWaveform);
  </script>
</body>
</html>
